name: Backfill Historico PLACE (manual, ZIPs anuales)

on:
  workflow_dispatch:
    inputs:
      years:
        description: 'Anios a procesar, separados por espacio (ej: 2021 2022 2023 2024)'
        required: false
        default: '2021 2022 2023 2024'

permissions:
  contents: write

jobs:
  backfill-historico-place:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar backfill historico masivo
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python backfill_place_historico.py --years ${{ github.event.inputs.years }}

      - name: Commit datos del backfill historico
        run: |
          git config --global user.name 'Robot Monitor AECID'
          git config --global user.email 'robot-aecid@noreply.github.com'
          git add data/raw/place_contratos.csv
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Backfill historico PLACE (ZIPs anuales)"
            git pull --rebase origin main
            git push
          else
            echo "Sin contratos nuevos encontrados."
          fi